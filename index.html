<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记英语单词</title>
  <style>
    :root {
      --bg-1: #fff8ef;
      --bg-2: #ffe3c4;
      --card: #ffffff;
      --ink: #22223b;
      --muted: #666;
      --line: #e7d8c9;
      --ok: #1e8e5a;
      --bad: #c0392b;
      --accent: #d17b00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 0% 0%, var(--bg-2), var(--bg-1) 40%);
      min-height: 100vh;
      padding: 28px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid #f0e6db;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(124, 82, 37, 0.12);
      overflow: hidden;
    }

    .head {
      padding: 20px 22px 16px;
      background: linear-gradient(115deg, #fff4e6, #ffeed8);
      border-bottom: 1px solid #f4dfc9;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .level-select {
      border: 1px solid #dbc9b6;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff8f1;
      color: #3a3128;
      font-weight: 600;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-dark { background: #30343f; color: #fff; }
    .btn-light { background: #f4ece4; color: #333; }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #444;
    }

    .status.score-line {
      font-size: 20px;
      font-weight: 800;
      color: #1f2937;
    }

    .wrong-count {
      color: #c0392b;
    }

    .stats-panel {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #eddcc9;
      border-radius: 10px;
      background: #fffaf4;
      font-size: 13px;
      color: #5b4c3f;
      line-height: 1.55;
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .pager button {
      padding: 7px 12px;
      border-radius: 8px;
      background: #f4ece4;
      color: #333;
      font-size: 13px;
    }

    .page-indicator {
      color: #666;
      font-size: 13px;
      font-weight: 600;
    }

    .table-wrap {
      padding: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #fff8f1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .num { width: 58px; color: #777; }
    .cn { width: 190px; font-weight: 600; }

    input[type="text"] {
      width: 100%;
      border: 1px solid #e6d7c7;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      background: #fffdfa;
    }

    input[type="text"]:focus {
      border-color: #d89a41;
      box-shadow: 0 0 0 3px rgba(209, 123, 0, 0.14);
    }

    .result {
      font-weight: 700;
      min-width: 68px;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    .answer {
      color: #555;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 13px;
      min-width: 120px;
    }

    .answer-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .speak-btn {
      border: 1px solid #d9c8b6;
      background: #fff8f1;
      color: #6f5a45;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
    }

    .speak-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 760px) {
      h1 { font-size: 20px; }
      .sub { font-size: 13px; }
      .table-wrap {
        padding: 10px;
      }
      table {
        min-width: 680px;
      }
      th, td {
        font-size: 13px;
        padding: 8px 6px;
      }
      .cn {
        width: 130px;
      }
      .answer {
        min-width: 110px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <h1>记英语单词</h1>
      <p class="sub">每次随机抽取 50 个中文单词，填写英文后一键批改。</p>
      <div class="toolbar">
        <select class="level-select" id="levelSelect">
          <option value="all">词库：全部（初中+高中+拓展）</option>
          <option value="junior">词库：初中</option>
          <option value="high">词库：高中</option>
          <option value="extra">词库：拓展</option>
        </select>
        <button class="btn-primary" id="newSetBtn">随机50词</button>
        <button class="btn-light" id="wrongSetBtn">错题本练习</button>
        <button class="btn-light" id="clearWrongBtn">清空错题本</button>
        <button class="btn-dark" id="checkBtn">提交批改</button>
        <button class="btn-light" id="showBtn" disabled>查看答案</button>
      </div>
      <div class="status" id="statusText">点击“随机50词”开始。</div>
      <div class="stats-panel" id="statsPanel">学习统计加载中...</div>
      <div class="pager">
        <button id="prevPageBtn">上一批10词</button>
        <button id="nextPageBtn">下一批10词</button>
        <span class="page-indicator" id="pageIndicator">第 1 / 5 批</span>
      </div>
    </header>

    <section class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th class="num">序号</th>
            <th class="cn">中文</th>
            <th>你的英文</th>
            <th>结果</th>
            <th>标准答案</th>
          </tr>
        </thead>
        <tbody id="wordRows"></tbody>
      </table>
    </section>
  </main>

  <script src="word_bank.js"></script>
  <script>
    const WORD_BANK = window.WORD_BANK || [];
    const LEVEL_TEXT = {
      all: "全部",
      junior: "初中",
      high: "高中",
      extra: "拓展"
    };
    const ANSWER_ALIAS = {
      mom: ["mother", "mum"],
      mother: ["mom", "mum"],
      dad: ["father"],
      father: ["dad"],
      grandma: ["grandmother"],
      grandfather: ["grandpa"],
      grandpa: ["grandfather"],
      grandparent: ["grandparents"],
      bike: ["bicycle"],
      bicycle: ["bike"],
      movie: ["film"],
      film: ["movie"],
      autumn: ["fall"],
      fall: ["autumn"],
      shop: ["store"],
      store: ["shop"],
      cellphone: ["cell phone", "mobile phone", "phone"],
      phone: ["telephone", "mobile phone", "cell phone"],
      sofa: ["couch"],
      couch: ["sofa"],
      restroom: ["toilet", "bathroom"],
      bathroom: ["restroom", "toilet"]
    };

    const TAKE_COUNT = 50;
    if (!Array.isArray(WORD_BANK) || WORD_BANK.length < TAKE_COUNT) {
      throw new Error("词库加载失败或数量不足，请检查 word_bank.js");
    }
    const PAGE_SIZE = 10;

    const rowsEl = document.getElementById("wordRows");
    const statusEl = document.getElementById("statusText");
    const statsPanelEl = document.getElementById("statsPanel");
    const levelSelectEl = document.getElementById("levelSelect");
    const newSetBtn = document.getElementById("newSetBtn");
    const wrongSetBtn = document.getElementById("wrongSetBtn");
    const clearWrongBtn = document.getElementById("clearWrongBtn");
    const checkBtn = document.getElementById("checkBtn");
    const showBtn = document.getElementById("showBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pageIndicator = document.getElementById("pageIndicator");
    const pagerEl = document.querySelector(".pager");

    let currentWords = [];
    let currentPage = 0;
    let hasChecked = false;
    let touchStartX = 0;
    let currentMode = "random";
    let currentLevel = localStorage.getItem("word_level_filter") || "all";
    let wrongBook = loadWrongBook();
    let stats = loadStats();
    levelSelectEl.value = currentLevel;

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function getFilteredWordBank() {
      if (currentLevel === "all") return WORD_BANK;
      return WORD_BANK.filter((w) => w.level === currentLevel);
    }

    function pickRandomWords() {
      const source = getFilteredWordBank();
      const copy = [...source];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, TAKE_COUNT);
    }

    function loadWrongBook() {
      try {
        const raw = localStorage.getItem("word_wrong_book");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        if (parsed.length === 0) return [];
        // migrate old data format: [["中文","english"], ...]
        if (Array.isArray(parsed[0])) {
          return parsed
            .filter((x) => Array.isArray(x) && x.length === 2)
            .map(([cn, en]) => ({ cn, en, level: "all", wrongCount: 1, lastWrongAt: Date.now() }));
        }
        return parsed.filter((x) => x && x.cn && x.en);
      } catch (_) {
        return [];
      }
    }

    function saveWrongBook() {
      localStorage.setItem("word_wrong_book", JSON.stringify(wrongBook));
    }

    function addWrongWordsFromCurrent() {
      const map = new Map(wrongBook.map((x) => [`${x.cn}||${x.en}`, x]));
      const now = Date.now();
      currentWords.forEach((item) => {
        if (!item.isCorrect) {
          const key = `${item.cn}||${item.en}`;
          const exists = map.get(key);
          if (exists) {
            exists.wrongCount = (exists.wrongCount || 0) + 1;
            exists.lastWrongAt = now;
            map.set(key, exists);
          } else {
            map.set(key, {
              cn: item.cn,
              en: item.en,
              level: item.level || "all",
              wrongCount: 1,
              lastWrongAt: now
            });
          }
        }
      });
      wrongBook = Array.from(map.values());
      saveWrongBook();
    }

    function loadStats() {
      try {
        const raw = localStorage.getItem("word_study_stats");
        if (!raw) {
          return { totalAttempts: 0, totalCorrect: 0, totalWrong: 0, sessions: 0, byDate: {} };
        }
        const parsed = JSON.parse(raw);
        return {
          totalAttempts: parsed.totalAttempts || 0,
          totalCorrect: parsed.totalCorrect || 0,
          totalWrong: parsed.totalWrong || 0,
          sessions: parsed.sessions || 0,
          byDate: parsed.byDate || {}
        };
      } catch (_) {
        return { totalAttempts: 0, totalCorrect: 0, totalWrong: 0, sessions: 0, byDate: {} };
      }
    }

    function saveStats() {
      localStorage.setItem("word_study_stats", JSON.stringify(stats));
    }

    function updateStats(total, correct) {
      const wrong = total - correct;
      stats.totalAttempts += total;
      stats.totalCorrect += correct;
      stats.totalWrong += wrong;
      stats.sessions += 1;

      const day = new Date().toISOString().slice(0, 10);
      if (!stats.byDate[day]) {
        stats.byDate[day] = { attempts: 0, correct: 0, wrong: 0, sessions: 0 };
      }
      stats.byDate[day].attempts += total;
      stats.byDate[day].correct += correct;
      stats.byDate[day].wrong += wrong;
      stats.byDate[day].sessions += 1;
      saveStats();
      renderStatsPanel();
    }

    function renderStatsPanel() {
      const total = stats.totalAttempts;
      const correctRate = total ? ((stats.totalCorrect / total) * 100).toFixed(1) : "0.0";
      const day = new Date().toISOString().slice(0, 10);
      const today = stats.byDate[day] || { attempts: 0, correct: 0, wrong: 0, sessions: 0 };
      const topWrong = [...wrongBook]
        .sort((a, b) => (b.wrongCount || 0) - (a.wrongCount || 0))
        .slice(0, 3)
        .map((x) => `${x.cn}(${x.wrongCount})`)
        .join("、");
      const filteredCount = getFilteredWordBank().length;
      statsPanelEl.innerHTML = `词库分级：${LEVEL_TEXT[currentLevel]}（${filteredCount}词） | 累计练习：${stats.sessions}次，正确率：${correctRate}% | 今日：${today.sessions}次 / ${today.correct}/${today.attempts} | 错词TOP：${topWrong || "暂无"}`;
    }

    function getAnswerVariants(answer) {
      const base = normalize(answer);
      const set = new Set([base]);
      if (ANSWER_ALIAS[base]) {
        ANSWER_ALIAS[base].forEach((x) => set.add(normalize(x)));
      }
      Object.keys(ANSWER_ALIAS).forEach((k) => {
        if (ANSWER_ALIAS[k].includes(base)) set.add(normalize(k));
      });
      if (base.includes("-")) set.add(base.replace(/-/g, " "));
      if (base.includes(" ")) set.add(base.replace(/\s+/g, ""));
      return set;
    }

    function getTotalPages() {
      return Math.ceil(currentWords.length / PAGE_SIZE);
    }

    function updatePagerUI() {
      const pages = getTotalPages();
      if (pages === 0) {
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        pageIndicator.textContent = "第 0 / 0 批";
        return;
      }
      prevPageBtn.disabled = currentPage === 0;
      nextPageBtn.disabled = currentPage >= pages - 1;
      pageIndicator.textContent = `第 ${currentPage + 1} / ${pages} 批`;
    }

    function renderRows() {
      rowsEl.innerHTML = "";
      const start = currentPage * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, currentWords.length);

      for (let i = start; i < end; i += 1) {
        const item = currentWords[i];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="num">${String(i + 1).padStart(2, "0")}</td>
          <td class="cn">${item.cn}</td>
          <td><input type="text" data-index="${i}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="latin" value="${item.user}" /></td>
          <td class="result desktop-result"></td>
          <td class="answer desktop-answer"></td>
        `;
        const input = tr.querySelector("input");
        const resultValue = tr.querySelector(".desktop-result");
        const answerValue = tr.querySelector(".desktop-answer");

        input.addEventListener("input", (e) => {
          const index = Number(e.target.dataset.index);
          currentWords[index].user = e.target.value;
        });

        input.addEventListener("keydown", (e) => {
          const index = Number(e.target.dataset.index);
          if (e.key === "Enter" || e.key === "ArrowDown") {
            e.preventDefault();
            moveFocusToIndex(index + 1);
            return;
          }
          if (e.key === "ArrowUp") {
            e.preventDefault();
            moveFocusToIndex(index - 1);
          }
        });

        if (hasChecked) {
          if (item.isCorrect) {
            resultValue.textContent = "正确";
            resultValue.classList.add("ok");
            resultValue.classList.remove("bad");
          } else {
            resultValue.textContent = "错误";
            resultValue.classList.add("bad");
            resultValue.classList.remove("ok");
            renderAnswerCell(answerValue, item.en, item.showAnswer);
          }
        }
        rowsEl.appendChild(tr);
      }

      updatePagerUI();
    }

    function focusInputByIndex(index) {
      const input = rowsEl.querySelector(`input[data-index='${index}']`);
      if (!input) return;
      input.focus();
      input.select();
    }

    function renderAnswerCell(cell, word, visible) {
      if (!visible) {
        cell.textContent = "";
        return;
      }
      cell.textContent = "";
      const wrap = document.createElement("span");
      wrap.className = "answer-wrap";

      const text = document.createElement("span");
      text.textContent = word;

      const btn = document.createElement("button");
      btn.className = "speak-btn";
      btn.type = "button";
      btn.dataset.word = word;
      btn.textContent = "🔊";

      wrap.appendChild(text);
      wrap.appendChild(btn);
      cell.appendChild(wrap);
    }

    function speakWord(word) {
      if (!("speechSynthesis" in window)) {
        statusEl.classList.remove("score-line");
        statusEl.textContent = "当前浏览器不支持语音播放。";
        return;
      }
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function moveFocusToIndex(targetIndex) {
      if (targetIndex < 0 || targetIndex >= currentWords.length) return;
      const nextPage = Math.floor(targetIndex / PAGE_SIZE);
      if (nextPage !== currentPage) {
        currentPage = nextPage;
        renderRows();
      }
      focusInputByIndex(targetIndex);
    }

    function goToPage(page) {
      const pages = getTotalPages();
      const next = Math.max(0, Math.min(page, pages - 1));
      if (next === currentPage) return;
      currentPage = next;
      renderRows();
    }

    function startNewSet() {
      currentMode = "random";
      const source = getFilteredWordBank();
      if (source.length < TAKE_COUNT) {
        statusEl.classList.remove("score-line");
        statusEl.textContent = `当前级别“${LEVEL_TEXT[currentLevel]}”词数不足 ${TAKE_COUNT}，请切换词库。`;
        return;
      }
      currentWords = pickRandomWords().map((w) => ({
        cn: w.cn,
        en: w.en,
        level: w.level,
        accepted: Array.from(getAnswerVariants(w.en)),
        user: "",
        isCorrect: false,
        showAnswer: false
      }));

      currentPage = 0;
      hasChecked = false;
      showBtn.disabled = true;
      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = `已生成新的 50 词（${LEVEL_TEXT[currentLevel]}），请填写后点击“提交批改”。`;
    }

    function startWrongSet() {
      if (wrongBook.length === 0) {
        statusEl.textContent = "错题本目前为空，先做一套随机题再提交批改。";
        return;
      }

      currentMode = "wrong";
      const candidates = currentLevel === "all"
        ? [...wrongBook]
        : wrongBook.filter((x) => x.level === currentLevel);
      if (candidates.length === 0) {
        statusEl.classList.remove("score-line");
        statusEl.textContent = `错题本中没有“${LEVEL_TEXT[currentLevel]}”词。`;
        return;
      }
      const sorted = candidates.sort((a, b) => {
        const wc = (b.wrongCount || 0) - (a.wrongCount || 0);
        if (wc !== 0) return wc;
        return (b.lastWrongAt || 0) - (a.lastWrongAt || 0);
      });
      const selected = sorted.slice(0, TAKE_COUNT);
      currentWords = selected.map((w) => ({
        cn: w.cn,
        en: w.en,
        level: w.level || "all",
        accepted: Array.from(getAnswerVariants(w.en)),
        user: "",
        isCorrect: false,
        showAnswer: false
      }));

      currentPage = 0;
      hasChecked = false;
      showBtn.disabled = true;
      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = `已加载错题本（${LEVEL_TEXT[currentLevel]}），共 ${currentWords.length} 词，请填写后点击“提交批改”。`;
    }

    function clearWrongBook() {
      wrongBook = [];
      saveWrongBook();
      if (currentMode === "wrong") {
        currentWords = [];
        rowsEl.innerHTML = "";
        updatePagerUI();
      }
      statusEl.classList.remove("score-line");
      statusEl.textContent = "错题本已清空。";
      renderStatsPanel();
    }

    function checkAnswers() {
      if (currentWords.length === 0) {
        statusEl.textContent = "请先点击“随机50词”。";
        return;
      }

      let correct = 0;
      currentWords.forEach((item) => {
        const user = normalize(item.user);
        const accepts = new Set(item.accepted || [normalize(item.en)]);
        item.isCorrect = user !== "" && accepts.has(user);
        if (item.isCorrect) correct += 1;
      });

      hasChecked = true;
      addWrongWordsFromCurrent();
      showBtn.disabled = false;
      renderRows();

      const total = currentWords.length;
      const score = ((correct / total) * 100).toFixed(0);
      const wrongCount = total - correct;
      statusEl.classList.add("score-line");
      statusEl.innerHTML = `本次得分：${correct}/${total}（${score}%）  错误单词数：<span class="wrong-count">${wrongCount}</span>  错题本累计：${wrongBook.length}`;
      updateStats(total, correct);
    }

    function revealAnswers() {
      if (currentWords.length === 0) {
        statusEl.textContent = "请先点击“随机50词”。";
        return;
      }

      if (!hasChecked) {
        statusEl.classList.remove("score-line");
        statusEl.textContent = "请先提交批改，再查看答案。";
        return;
      }

      currentWords.forEach((item) => {
        item.showAnswer = true;
      });

      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = "已显示标准答案。";
    }

    newSetBtn.addEventListener("click", startNewSet);
    levelSelectEl.addEventListener("change", () => {
      currentLevel = levelSelectEl.value;
      localStorage.setItem("word_level_filter", currentLevel);
      renderStatsPanel();
      startNewSet();
    });
    wrongSetBtn.addEventListener("click", startWrongSet);
    clearWrongBtn.addEventListener("click", clearWrongBook);
    checkBtn.addEventListener("click", checkAnswers);
    showBtn.addEventListener("click", revealAnswers);
    rowsEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".speak-btn");
      if (!btn) return;
      speakWord(btn.dataset.word || "");
    });
    prevPageBtn.addEventListener("click", () => goToPage(currentPage - 1));
    nextPageBtn.addEventListener("click", () => goToPage(currentPage + 1));

    function bindSwipe(container) {
      container.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      container.addEventListener("touchend", (e) => {
        const touchEndX = e.changedTouches[0].screenX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) < 50) return;
        if (delta < 0) goToPage(currentPage + 1);
        if (delta > 0) goToPage(currentPage - 1);
      }, { passive: true });
    }

    bindSwipe(pagerEl);

    window.addEventListener("resize", renderRows);

    renderStatsPanel();
    startNewSet();
  </script>
</body>
</html>
