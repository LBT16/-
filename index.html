<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记英语单词</title>
  <style>
    :root {
      --bg-1: #fff8ef;
      --bg-2: #ffe3c4;
      --card: #ffffff;
      --ink: #22223b;
      --muted: #666;
      --line: #e7d8c9;
      --ok: #1e8e5a;
      --bad: #c0392b;
      --accent: #d17b00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 0% 0%, var(--bg-2), var(--bg-1) 40%);
      min-height: 100vh;
      padding: 28px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid #f0e6db;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(124, 82, 37, 0.12);
      overflow: hidden;
    }

    .head {
      padding: 20px 22px 16px;
      background: linear-gradient(115deg, #fff4e6, #ffeed8);
      border-bottom: 1px solid #f4dfc9;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-dark { background: #30343f; color: #fff; }
    .btn-light { background: #f4ece4; color: #333; }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #444;
    }

    .status.score-line {
      font-size: 20px;
      font-weight: 800;
      color: #1f2937;
    }

    .wrong-count {
      color: #c0392b;
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .pager button {
      padding: 7px 12px;
      border-radius: 8px;
      background: #f4ece4;
      color: #333;
      font-size: 13px;
    }

    .page-indicator {
      color: #666;
      font-size: 13px;
      font-weight: 600;
    }

    .table-wrap {
      padding: 14px;
      overflow-x: auto;
      touch-action: pan-y;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #fff8f1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .num { width: 58px; color: #777; }
    .cn { width: 190px; font-weight: 600; }

    input[type="text"] {
      width: 100%;
      border: 1px solid #e6d7c7;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      background: #fffdfa;
    }

    input[type="text"]:focus {
      border-color: #d89a41;
      box-shadow: 0 0 0 3px rgba(209, 123, 0, 0.14);
    }

    .result {
      font-weight: 700;
      min-width: 68px;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    .answer {
      color: #555;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 13px;
      min-width: 120px;
    }

    @media (max-width: 760px) {
      h1 { font-size: 20px; }
      .sub { font-size: 13px; }
      th, td { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <h1>记英语单词</h1>
      <p class="sub">每次随机抽取 50 个中文单词，填写英文后一键批改。</p>
      <div class="toolbar">
        <button class="btn-primary" id="newSetBtn">随机50词</button>
        <button class="btn-light" id="wrongSetBtn">错题本练习</button>
        <button class="btn-light" id="clearWrongBtn">清空错题本</button>
        <button class="btn-dark" id="checkBtn">提交批改</button>
        <button class="btn-light" id="showBtn" disabled>查看答案</button>
      </div>
      <div class="status" id="statusText">点击“随机50词”开始。</div>
      <div class="pager">
        <button id="prevPageBtn">上一批10词</button>
        <button id="nextPageBtn">下一批10词</button>
        <span class="page-indicator" id="pageIndicator">第 1 / 5 批（支持左右滑动切换）</span>
      </div>
    </header>

    <section class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th class="num">序号</th>
            <th class="cn">中文</th>
            <th>你的英文</th>
            <th>结果</th>
            <th>标准答案</th>
          </tr>
        </thead>
        <tbody id="wordRows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const WORD_BANK = [
      ["苹果", "apple"], ["香蕉", "banana"], ["橙子", "orange"], ["葡萄", "grape"], ["西瓜", "watermelon"],
      ["草莓", "strawberry"], ["桃子", "peach"], ["梨", "pear"], ["菠萝", "pineapple"], ["芒果", "mango"],
      ["米饭", "rice"], ["面包", "bread"], ["牛奶", "milk"], ["鸡蛋", "egg"], ["鱼", "fish"],
      ["鸡肉", "chicken"], ["牛肉", "beef"], ["猪肉", "pork"], ["汤", "soup"], ["面条", "noodles"],
      ["猫", "cat"], ["狗", "dog"], ["鸟", "bird"], ["兔子", "rabbit"], ["马", "horse"],
      ["牛", "cow"], ["羊", "sheep"], ["鸭", "duck"], ["母鸡", "hen"], ["老虎", "tiger"],
      ["狮子", "lion"], ["熊", "bear"], ["猴子", "monkey"], ["大象", "elephant"], ["熊猫", "panda"],
      ["红色", "red"], ["蓝色", "blue"], ["绿色", "green"], ["黄色", "yellow"], ["黑色", "black"],
      ["白色", "white"], ["紫色", "purple"], ["粉色", "pink"], ["棕色", "brown"], ["灰色", "gray"],
      ["太阳", "sun"], ["月亮", "moon"], ["星星", "star"], ["天空", "sky"], ["云", "cloud"],
      ["妈妈", "mother"], ["爸爸", "father"], ["哥哥", "brother"], ["姐姐", "sister"], ["爷爷", "grandfather"],
      ["奶奶", "grandmother"], ["朋友", "friend"], ["老师", "teacher"], ["学生", "student"], ["医生", "doctor"],
      ["头", "head"], ["眼睛", "eye"], ["耳朵", "ear"], ["鼻子", "nose"], ["嘴巴", "mouth"],
      ["桌子", "table"], ["椅子", "chair"], ["床", "bed"], ["门", "door"], ["窗户", "window"],
      ["书", "book"], ["钢笔", "pen"], ["铅笔", "pencil"], ["橡皮", "eraser"], ["尺子", "ruler"],
      ["书包", "schoolbag"], ["电脑", "computer"], ["手机", "phone"], ["手表", "watch"], ["钥匙", "key"],
      ["跑", "run"], ["走", "walk"], ["跳", "jump"], ["看", "look"], ["听", "listen"],
      ["说", "speak"], ["读", "read"], ["写", "write"], ["吃", "eat"], ["喝", "drink"],
      ["大", "big"], ["小", "small"], ["快", "fast"], ["慢", "slow"], ["热", "hot"],
      ["冷", "cold"], ["今天", "today"], ["明天", "tomorrow"], ["昨天", "yesterday"], ["学校", "school"],
      ["城市", "city"], ["村庄", "village"], ["国家", "country"], ["地图", "map"], ["道路", "road"],
      ["桥", "bridge"], ["河流", "river"], ["湖", "lake"], ["海洋", "ocean"], ["山", "mountain"],
      ["森林", "forest"], ["花", "flower"], ["树", "tree"], ["草", "grass"], ["叶子", "leaf"],
      ["雨", "rain"], ["雪", "snow"], ["风", "wind"], ["天气", "weather"], ["春天", "spring"],
      ["夏天", "summer"], ["秋天", "autumn"], ["冬天", "winter"], ["早晨", "morning"], ["夜晚", "night"],
      ["游泳", "swim"], ["唱歌", "sing"], ["跳舞", "dance"], ["画画", "draw"], ["学习", "study"],
      ["工作", "work"], ["睡觉", "sleep"], ["醒来", "wake"], ["打开", "open"], ["关闭", "close"],
      ["开始", "start"], ["结束", "finish"], ["买", "buy"], ["卖", "sell"], ["发送", "send"],
      ["收到", "receive"], ["帮助", "help"], ["等待", "wait"], ["寻找", "search"], ["找到", "find"],
      ["洗", "wash"], ["打扫", "clean"], ["烹饪", "cook"], ["练习", "practice"], ["准备", "prepare"],
      ["高", "tall"], ["矮", "short"], ["年轻", "young"], ["年老", "old"], ["开心", "happy"],
      ["难过", "sad"], ["容易", "easy"], ["困难", "difficult"], ["干净", "neat"], ["脏", "dirty"],
      ["安静", "quiet"], ["吵闹", "noisy"], ["明亮", "bright"], ["黑暗", "dark"], ["重要", "important"],
      ["安全", "safe"], ["危险", "dangerous"], ["正确", "correct"], ["错误", "wrong"], ["特别", "special"],
      ["便宜", "cheap"], ["昂贵", "expensive"], ["新", "new"], ["旧", "old"], ["简单", "simple"],
      ["自行车", "bicycle"], ["汽车", "car"], ["公交车", "bus"], ["火车", "train"], ["飞机", "airplane"],
      ["船", "boat"], ["机场", "airport"], ["车站", "station"], ["票", "ticket"], ["钱包", "wallet"],
      ["帽子", "hat"], ["鞋", "shoes"], ["袜子", "socks"], ["衬衫", "shirt"], ["裤子", "pants"],
      ["外套", "coat"], ["裙子", "dress"], ["雨伞", "umbrella"], ["礼物", "gift"], ["照片", "photo"],
      ["超市", "supermarket"], ["医院", "hospital"], ["公园", "park"], ["图书馆", "library"], ["餐厅", "restaurant"]
    ];

    const TAKE_COUNT = 50;
    const PAGE_SIZE = 10;

    const rowsEl = document.getElementById("wordRows");
    const statusEl = document.getElementById("statusText");
    const newSetBtn = document.getElementById("newSetBtn");
    const wrongSetBtn = document.getElementById("wrongSetBtn");
    const clearWrongBtn = document.getElementById("clearWrongBtn");
    const checkBtn = document.getElementById("checkBtn");
    const showBtn = document.getElementById("showBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pageIndicator = document.getElementById("pageIndicator");
    const tableWrap = document.getElementById("tableWrap");

    let currentWords = [];
    let currentPage = 0;
    let hasChecked = false;
    let touchStartX = 0;
    let currentMode = "random";
    let wrongBook = loadWrongBook();

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function pickRandomWords() {
      const copy = [...WORD_BANK];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, TAKE_COUNT);
    }

    function loadWrongBook() {
      try {
        const raw = localStorage.getItem("word_wrong_book");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter((x) => Array.isArray(x) && x.length === 2);
      } catch (_) {
        return [];
      }
    }

    function saveWrongBook() {
      localStorage.setItem("word_wrong_book", JSON.stringify(wrongBook));
    }

    function addWrongWordsFromCurrent() {
      const map = new Map(wrongBook.map(([cn, en]) => [`${cn}||${en}`, [cn, en]]));
      currentWords.forEach((item) => {
        if (!item.isCorrect) {
          map.set(`${item.cn}||${item.en}`, [item.cn, item.en]);
        }
      });
      wrongBook = Array.from(map.values());
      saveWrongBook();
    }

    function getTotalPages() {
      return Math.ceil(currentWords.length / PAGE_SIZE);
    }

    function updatePagerUI() {
      const pages = getTotalPages();
      if (pages === 0) {
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        pageIndicator.textContent = "第 0 / 0 批（支持左右滑动切换）";
        return;
      }
      prevPageBtn.disabled = currentPage === 0;
      nextPageBtn.disabled = currentPage >= pages - 1;
      pageIndicator.textContent = `第 ${currentPage + 1} / ${pages} 批（支持左右滑动切换）`;
    }

    function renderRows() {
      rowsEl.innerHTML = "";
      const start = currentPage * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, currentWords.length);

      for (let i = start; i < end; i += 1) {
        const item = currentWords[i];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="num">${String(i + 1).padStart(2, "0")}</td>
          <td class="cn">${item.cn}</td>
          <td><input type="text" data-index="${i}" autocomplete="off" value="${item.user}" /></td>
          <td class="result"></td>
          <td class="answer"></td>
        `;

        const input = tr.querySelector("input");
        const resultCell = tr.querySelector(".result");
        const answerCell = tr.querySelector(".answer");

        input.addEventListener("input", (e) => {
          const index = Number(e.target.dataset.index);
          currentWords[index].user = e.target.value;
        });

        input.addEventListener("keydown", (e) => {
          const index = Number(e.target.dataset.index);
          if (e.key === "Enter" || e.key === "ArrowDown") {
            e.preventDefault();
            moveFocusToIndex(index + 1);
            return;
          }
          if (e.key === "ArrowUp") {
            e.preventDefault();
            moveFocusToIndex(index - 1);
          }
        });

        if (hasChecked) {
          if (item.isCorrect) {
            resultCell.textContent = "正确";
            resultCell.className = "result ok";
          } else {
            resultCell.textContent = "错误";
            resultCell.className = "result bad";
            answerCell.textContent = item.showAnswer ? item.en : "";
          }
        }

        rowsEl.appendChild(tr);
      }

      updatePagerUI();
    }

    function focusInputByIndex(index) {
      const input = rowsEl.querySelector(`input[data-index='${index}']`);
      if (!input) return;
      input.focus();
      input.select();
    }

    function moveFocusToIndex(targetIndex) {
      if (targetIndex < 0 || targetIndex >= currentWords.length) return;
      const nextPage = Math.floor(targetIndex / PAGE_SIZE);
      if (nextPage !== currentPage) {
        currentPage = nextPage;
        renderRows();
      }
      focusInputByIndex(targetIndex);
    }

    function goToPage(page) {
      const pages = getTotalPages();
      const next = Math.max(0, Math.min(page, pages - 1));
      if (next === currentPage) return;
      currentPage = next;
      renderRows();
    }

    function startNewSet() {
      currentMode = "random";
      currentWords = pickRandomWords().map(([cn, en]) => ({
        cn,
        en,
        user: "",
        isCorrect: false,
        showAnswer: false
      }));

      currentPage = 0;
      hasChecked = false;
      showBtn.disabled = true;
      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = "已生成新的 50 词（每批10词），请填写后点击“提交批改”。";
    }

    function startWrongSet() {
      if (wrongBook.length === 0) {
        statusEl.textContent = "错题本目前为空，先做一套随机题再提交批改。";
        return;
      }

      currentMode = "wrong";
      const shuffled = [...wrongBook];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      currentWords = shuffled.map(([cn, en]) => ({
        cn,
        en,
        user: "",
        isCorrect: false,
        showAnswer: false
      }));

      currentPage = 0;
      hasChecked = false;
      showBtn.disabled = true;
      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = `已加载错题本，共 ${currentWords.length} 词，请填写后点击“提交批改”。`;
    }

    function clearWrongBook() {
      wrongBook = [];
      saveWrongBook();
      if (currentMode === "wrong") {
        currentWords = [];
        rowsEl.innerHTML = "";
        updatePagerUI();
      }
      statusEl.classList.remove("score-line");
      statusEl.textContent = "错题本已清空。";
    }

    function checkAnswers() {
      if (currentWords.length === 0) {
        statusEl.textContent = "请先点击“随机50词”。";
        return;
      }

      let correct = 0;
      currentWords.forEach((item) => {
        const user = normalize(item.user);
        const answer = normalize(item.en);
        item.isCorrect = user !== "" && user === answer;
        if (item.isCorrect) correct += 1;
      });

      hasChecked = true;
      addWrongWordsFromCurrent();
      showBtn.disabled = false;
      renderRows();

      const total = currentWords.length;
      const score = ((correct / total) * 100).toFixed(0);
      const wrongCount = total - correct;
      statusEl.classList.add("score-line");
      statusEl.innerHTML = `本次得分：${correct}/${total}（${score}%）  错误单词数：<span class="wrong-count">${wrongCount}</span>  错题本累计：${wrongBook.length}`;
    }

    function revealAnswers() {
      if (currentWords.length === 0) {
        statusEl.textContent = "请先点击“随机50词”。";
        return;
      }

      if (!hasChecked) {
        statusEl.classList.remove("score-line");
        statusEl.textContent = "请先提交批改，再查看答案。";
        return;
      }

      currentWords.forEach((item) => {
        item.showAnswer = true;
      });

      renderRows();
      statusEl.classList.remove("score-line");
      statusEl.textContent = "已显示标准答案。";
    }

    newSetBtn.addEventListener("click", startNewSet);
    wrongSetBtn.addEventListener("click", startWrongSet);
    clearWrongBtn.addEventListener("click", clearWrongBook);
    checkBtn.addEventListener("click", checkAnswers);
    showBtn.addEventListener("click", revealAnswers);
    prevPageBtn.addEventListener("click", () => goToPage(currentPage - 1));
    nextPageBtn.addEventListener("click", () => goToPage(currentPage + 1));

    tableWrap.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    tableWrap.addEventListener("touchend", (e) => {
      const touchEndX = e.changedTouches[0].screenX;
      const delta = touchEndX - touchStartX;
      if (Math.abs(delta) < 50) return;
      if (delta < 0) goToPage(currentPage + 1);
      if (delta > 0) goToPage(currentPage - 1);
    }, { passive: true });

    startNewSet();
  </script>
</body>
</html>
